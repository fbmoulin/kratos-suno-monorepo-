name: Web CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "packages/core/**"
      - "packages/web/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "packages/core/**"
      - "packages/web/**"
      - ".github/workflows/web.yml"

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck core
        run: pnpm --filter @kratos-suno/core typecheck

      - name: Typecheck web
        run: pnpm --filter @kratos-suno/web typecheck

      - name: Build web
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'https://api.kratos-suno.felipemoulin.com' }}
          VITE_SHARED_SECRET: ${{ secrets.VITE_SHARED_SECRET }}
        run: pnpm --filter @kratos-suno/web build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          retention-days: 7

  # -------------------------------------------------------------------
  deploy-cloudflare:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy packages/web/dist
            --project-name=kratos-suno
            --branch=${{ github.ref == 'refs/heads/main' && 'main' || 'preview' }}
